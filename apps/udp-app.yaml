apiVersion: apps/v1
kind: Deployment
metadata:
  name: udp-echo-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: udp-echo
  template:
    metadata:
      labels:
        app: udp-echo
    spec:
      containers:
      - name: echo-container
        image: busybox
        ports:
        - containerPort: 12345
          protocol: UDP
        command: ["sh", "-c", "nc -ulp 12345"]
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: udp-echo-service
spec:
  selector:
    app: udp-echo
  ports:
  - protocol: UDP
    port: 12345
    targetPort: 12345