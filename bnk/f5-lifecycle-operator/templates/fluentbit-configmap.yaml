{{- if and .Values.fluentbit_sidecar .Values.fluentbit_sidecar.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: f5-flo-fluentbit-config
  labels:
    k8s-app: fluent-bit
data:
  # Configuration files: server, input, filters and output
  # ======================================================
  fluent-bit.conf: |
    [SERVICE]
        Flush         {{ .Values.fluentbit_sidecar.fluentbit.flush_interval }}
        Log_Level     {{ .Values.fluentbit_sidecar.fluentbit.logLevel }}
        Daemon        off
        Parsers_File  parsers.conf
        HTTP_Server   off
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020
        Storage.Path  /fluent-bit/storage

    @INCLUDE input.conf
    @INCLUDE filter-k8s.conf
    @INCLUDE output-fluentd.conf
    {{- if .Values.fluentbit_sidecar.debug }}
    @INCLUDE output-stdout.conf
    {{- end }}

  input.conf: |
    [INPUT]
        Name              named_pipe
        Tag               kube.f5.log
        Path              /var/run/f5/*.pipe
        Path_Key          path
        # Parser            docker
        buf_size          {{ .Values.fluentbit_sidecar.fluentbit.input.pipes.bufSize }}
        interval_sec      {{ .Values.fluentbit_sidecar.fluentbit.input.pipes.intervalSec }}
        interval_nsec     {{ .Values.fluentbit_sidecar.fluentbit.input.pipes.intervalNsec }}

  filter-k8s.conf: |
    [FILTER]
        Name    record_modifier
        Match   kube.f5.log
        Record  namespace ${NAMESPACE}
        Record  node ${NODE}
        Record  pod ${POD}
        Record  pod_id ${POD_ID}
        Record  service flo

    [FILTER]
        Name          parser
        Match         kube.f5.log
        Key_Name      pod
        Parser        podname
        Preserve_Key  True
        Reserve_Data  True

    [FILTER]
        Name          parser
        Match         kube.f5.log
        Key_Name      path
        Parser        logtype
        Reserve_Data  True

  output-stdout.conf: |
    [OUTPUT]
        Name            stdout
        Match           kube.f5.log

  output-fluentd.conf: |
    [OUTPUT]
        Name          forward
        Match         kube.f5.*
        Host          {{ .Values.fluentbit_sidecar.fluentd.host }}
        Port          {{ .Values.fluentbit_sidecar.fluentd.port | default 54321 }}
        Retry_Limit   30
        {{- if .Values.fluentbit_sidecar.fluentbit.tls.enabled }}
        tls               On
        tls.debug         {{ .Values.fluentbit_sidecar.fluentbit.tls.debug }}
        tls.verify        {{ .Values.fluentbit_sidecar.fluentbit.tls.verify }}
        tls.ca_file       /tls/flofluentbit/tcp/clt/ca.crt
        tls.crt_file      /tls/flofluentbit/tcp/clt/tls.crt
        tls.key_file      /tls/flofluentbit/tcp/clt/tls.key
        Shared_Key        {{ .Values.fluentbit_sidecar.fluentbit.tls.shared_key }}
        {{- end }}

  parsers.conf: |
    [PARSER]
        Name        docker
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L
        Time_Keep   On

    [PARSER]
        # Add new field 'type'(stdout or stderr) to logs
        # To parse '/var/run/f5/f5-flo_(stdout|stderr).pipe'
        Name logtype
        Format regex
        Regex [^(stdout|stderr)]+(?<type>(stdout|stderr)).pipe$

    [PARSER]
        # Add new field 'pod_name' to logs
        # To parse 'tmp-flo-example-75cc78f9c6-tgr5b'
        Name podname
        Format regex
        Regex (?<pod_name>.+)-[a-z0-9]{9,10}-[a-z0-9]{5}$
{{- end -}}
