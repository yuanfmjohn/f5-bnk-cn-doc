apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: sriov-net-1
  namespace: default
  annotations:
    k8s.v1.cni.cncf.io/resourceName: intel.com/intel_sriov_netdevice
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "type": "sriov",
      "name": "sriov-net-1",
      "ipam": {
        "type": "host-local",
        "subnet": "192.168.48.0/24",
        "rangeStart": "192.168.48.245",
        "rangeEnd": "192.168.48.250",
        "gateway": "192.168.48.1"
      }
    }
---
apiVersion: v1
kind: Pod
metadata:
  name: sriov-debug
  namespace: default
  annotations:
    k8s.v1.cni.cncf.io/networks: sriov-net-1
spec:
  containers:
  - name: debug
    image: nicolaka/netshoot
    command: ["/bin/bash"]
    stdin: true
    tty: true
    resources:
      requests:
        intel.com/intel_sriov_netdevice: "1"
      limits:
        intel.com/intel_sriov_netdevice: "1"
