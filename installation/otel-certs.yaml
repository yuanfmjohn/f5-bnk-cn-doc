apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: external-otelsvr
spec:
  commonName: f5net.com
  secretName: external-otelsvr-secret
  issuerRef:
    name: f5-bnk-ca-cluster-issuer
    kind: ClusterIssuer
  duration: 8640h
  privateKey:
    rotationPolicy: Always
    algorithm: RSA
    size: 4096
