# prometheus-config-with-otel.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: f5-bnk
data:
  prometheus.yaml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    
    scrape_configs:
      # OTEL Collector에서 F5 BNK 메트릭 수집
      - job_name: 'f5-bnk-otel'
        static_configs:
          - targets: ['otel-collector-svc.f5-bnk.svc.cluster.local:9090']
        metric_relabel_configs:
          # 메트릭 이름 정규화
          - source_labels: [__name__]
            regex: '(.+)_(.+)'
            replacement: 'f5_$1_$2'
            target_label: __name__
            action: replace
      
      # F5 Observer Pods (직접 스크랩)
      - job_name: 'f5-observer'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
              - f5-bnk
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: f5-observer
            action: keep
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod_name
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
      
      # F5 TMM Pods
      - job_name: 'f5-tmm'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
              - f5-bnk
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: f5-tmm
            action: keep
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            regex: true
            action: keep
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
            target_label: __address__
            regex: (.+)
            replacement: $1:9090
      
      # Kubernetes Pods (일반)
      - job_name: 'k8s_pod'
        kubernetes_sd_configs:
        - role: pod
          namespaces:
            names:
            - f5-bnk
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            regex: true
            action: keep
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod_name
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace