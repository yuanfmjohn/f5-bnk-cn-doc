apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: wildcard-tls-gw
  namespace: web
spec:
  addresses:
  - type: "IPAddress"
    value: 192.168.48.202
  gatewayClassName: f5-gateway-class
  listeners:
  - name: wildcard-https2
    protocol: HTTPS
    port: 443
    hostname: "www.f5bnk.com"
    tls:
      certificateRefs:
      - kind: Secret
        namespace: web
        group: ""
        name: web-test-tls-cert
    allowedRoutes:
      namespaces:
        from: "All"
      kinds:
      - kind: HTTPRoute
  - name: wildcard-https1
    protocol: HTTPS
    port: 443
    hostname: "*.f5bnk.com"
    tls:
      certificateRefs:
      - kind: Secret
        namespace: sec-infra
        group: ""
        name: web-test-wildcard-tls-cert
    allowedRoutes:
      namespaces:
        from: "All"
      kinds:
      - kind: HTTPRoute
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-route-httpbin1
  namespace: web
spec:
  parentRefs:
  - name: wildcard-tls-gw
    sectionName: wildcard-https1
  rules:
  - backendRefs:
    - name: httpbin
      port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-route-httpbin2
  namespace: web
spec:
  parentRefs:
  - name: wildcard-tls-gw
    sectionName: wildcard-https2
  rules:
  - backendRefs:
    - name: httpbin
      port: 8080
